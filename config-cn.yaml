# ==============================================================
# Mihomo 分流配置 - 中国大陆版
# 适用客户端: Clash Verge (macOS) / Stash (iOS)
# 规则来源: Loyalsoldier/clash-rules (每日自动更新)
# 策略: 白名单模式 — 国内直连，其余走代理
# ==============================================================

# --- 基础设置 ---
mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

# --- GeoData 设置 (Mihomo) ---
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"

# --- TLS 指纹 ---
tls:
  fingerprint: chrome

# --- DNS 配置 ---
# 大陆需要分流 DNS: 国内域名用国内 DNS，国外域名用加密 DNS
dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.test"
    - "dns.msftncsi.com"
    - "www.msftncsi.com"
    - "*.msftconnecttest.com"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "time.*.apple.com"
    - "time-ios.apple.com"
    - "ntp.*.com"
    - "*.ntp.org.cn"
    - "+.pool.ntp.org"
    - "stun.*.*"
    - "stun.*.*.*"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "localhost.ptlogin2.qq.com"
    - "*.logon.battlenet.com.cn"
    - "*.logon.battle.net"
    - "*.blzstatic.cn"
    - "music.163.com"
    - "*.music.163.com"
    - "*.126.net"
    - "musicapi.taihe.com"
    - "music.taihe.com"
    - "songsearch.kugou.com"
    - "trackercdn.kugou.com"
    - "*.kuwo.cn"
    - "api-jooxtt.sanook.com"
    - "api.joox.com"
    - "joox.com"
    - "y.qq.com"
    - "*.y.qq.com"
    - "streamoc.music.tc.qq.com"
    - "mobileoc.music.tc.qq.com"
    - "isure.stream.qqmusic.qq.com"
    - "dl.stream.qqmusic.qq.com"
    - "aqqmusic.tc.qq.com"
    - "amobile.music.tc.qq.com"
    - "*.xiami.com"
    - "*.taihe.com"
    - "*.kuwo.cn"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - tls://8.8.4.4:853
    - tls://1.1.1.1:853
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
  nameserver-policy:
    "geosite:cn,private":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query

# ==============================================================
# 代理节点
# ⚠️ 请替换下方占位符为你的实际 Xray REALITY 配置
# ==============================================================
proxies:
  - name: "US-LAX-DMIT"
    type: vless
    server: YOUR_SERVER_IP         # ← 替换: 服务器 IP
    port: 443                      # ← 替换: 端口号
    uuid: YOUR_UUID                # ← 替换: UUID
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: YOUR_SNI_DOMAIN    # ← 替换: SNI 域名 (如 www.microsoft.com)
    reality-opts:
      public-key: YOUR_PUBLIC_KEY  # ← 替换: 公钥
      short-id: YOUR_SHORT_ID     # ← 替换: Short ID
    client-fingerprint: chrome

# ==============================================================
# 代理组
# ==============================================================
proxy-groups:
  # 主代理选择
  - name: Proxy
    type: select
    proxies:
      - US-LAX-DMIT
      - DIRECT

  # AI 服务 — OpenAI/Claude/Gemini 在大陆和港澳均不可用，必须走美国
  - name: AI
    type: select
    proxies:
      - US-LAX-DMIT

  # 流媒体
  - name: Streaming
    type: select
    proxies:
      - US-LAX-DMIT
      - DIRECT

  # Google 服务
  - name: Google
    type: select
    proxies:
      - US-LAX-DMIT
      - DIRECT

  # Telegram
  - name: Telegram
    type: select
    proxies:
      - US-LAX-DMIT
      - DIRECT

  # 社交媒体 (Twitter/Facebook/Instagram)
  - name: Social
    type: select
    proxies:
      - US-LAX-DMIT
      - DIRECT

  # GitHub
  - name: GitHub
    type: select
    proxies:
      - US-LAX-DMIT
      - DIRECT

  # Apple 服务
  - name: Apple
    type: select
    proxies:
      - DIRECT
      - US-LAX-DMIT

  # Microsoft 服务
  - name: Microsoft
    type: select
    proxies:
      - DIRECT
      - US-LAX-DMIT

  # 国内直连
  - name: Domestic
    type: select
    proxies:
      - DIRECT
      - US-LAX-DMIT

  # 广告拦截
  - name: AdBlock
    type: select
    proxies:
      - REJECT
      - DIRECT

# ==============================================================
# 规则提供者 (Loyalsoldier/clash-rules, 每日 6:30 AM 北京时间更新)
# 大陆使用 CDN 加速: cdn.jsdelivr.net
# ==============================================================
rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

  private:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  icloud:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt"
    path: ./ruleset/icloud.yaml
    interval: 86400

  apple:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt"
    path: ./ruleset/apple.yaml
    interval: 86400

  google:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt"
    path: ./ruleset/google.yaml
    interval: 86400

  proxy:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
    path: ./ruleset/proxy.yaml
    interval: 86400

  direct:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400

  gfw:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt"
    path: ./ruleset/gfw.yaml
    interval: 86400

  tld-not-cn:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt"
    path: ./ruleset/tld-not-cn.yaml
    interval: 86400

  telegramcidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 86400

  cncidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
    path: ./ruleset/cncidr.yaml
    interval: 86400

  lancidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 86400

  applications:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt"
    path: ./ruleset/applications.yaml
    interval: 86400

# ==============================================================
# 分流规则
# 规则顺序: 域名规则在前, IP 规则在后, 避免不必要的 DNS 解析
# ==============================================================
rules:
  # --- 本地/局域网 ---
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve
  - RULE-SET,applications,DIRECT

  # --- 广告拦截 ---
  - RULE-SET,reject,AdBlock

  # --- AI 服务 (必须走美国节点) ---
