# ==============================================================
# Mihomo 分流配置 - 香港版
# 适用客户端: Clash Verge Rev (macOS) / Stash (iOS)
# 规则来源: Loyalsoldier/clash-rules (每日自动更新)
# 策略: 黑名单模式 — 默认直连，仅 AI/手动选择的服务走代理
# ==============================================================

# --- 基础设置 ---
mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

# --- GeoData 设置 ---
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  mmdb: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb"

# --- TLS 指纹 ---
tls:
  fingerprint: chrome

# --- DNS 配置 ---
# 香港网络无污染，DNS 配置较简单
dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.test"
    - "+.msftncsi.com"
    - "+.msftconnecttest.com"
    - "+.pool.ntp.org"
    - "time.*.com"
    - "time.*.apple.com"
    - "stun.*.*"
    - "+.stun.*.*"
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  fallback:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: HK

# ==============================================================
# 代理节点
# 请替换下方占位符为你的 Xray REALITY 配置
# ==============================================================
proxies:
  - name: "US-LAX-DMIT"
    type: vless
    server: YOUR_SERVER_IP
    port: 443
    uuid: YOUR_UUID
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: YOUR_SNI_DOMAIN
    reality-opts:
      public-key: YOUR_PUBLIC_KEY
      short-id: YOUR_SHORT_ID
    client-fingerprint: chrome

# ==============================================================
# 策略组
# ==============================================================
proxy-groups:
  # 主代理出口 (手动切换)
  - name: PROXY
    type: select
    proxies:
      - AUTO
      - US-LAX-DMIT
      - DIRECT

  # 自动选择最快节点
  - name: AUTO
    type: url-test
    proxies:
      - US-LAX-DMIT
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  # AI 服务 (香港 IP 被 OpenAI/Claude/Gemini 等屏蔽，必须走美国)
  - name: AI
    type: select
    proxies:
      - PROXY
      - AUTO
      - US-LAX-DMIT

# ==============================================================
# 规则提供者 (Loyalsoldier/clash-rules, 每日 6:30 AM 北京时间更新)
# ==============================================================
rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

  private:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  direct:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400

  cncidr:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt"
    path: ./ruleset/cncidr.yaml
    interval: 86400

  lancidr:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 86400

  applications:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/applications.txt"
    path: ./ruleset/applications.yaml
    interval: 86400

# ==============================================================
# 分流规则
# 香港默认直连，仅 AI 走代理；其他服务需要代理时通过 PROXY 组手动切换
# ==============================================================
rules:
  # --- 局域网/私有网络 ---
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve
  - RULE-SET,applications,DIRECT

  # --- 广告拦截 ---
  - RULE-SET,reject,REJECT

  # --- 自定义补丁: AI 服务 (必须走代理) ---
  - DOMAIN-SUFFIX,openai.com,AI
  - DOMAIN-SUFFIX,chatgpt.com,AI
  - DOMAIN-SUFFIX,oaistatic.com,AI
  - DOMAIN-SUFFIX,oaiusercontent.com,AI
  - DOMAIN-SUFFIX,anthropic.com,AI
  - DOMAIN-SUFFIX,claude.ai,AI
  - DOMAIN-SUFFIX,claudeusercontent.com,AI
  - DOMAIN-SUFFIX,gemini.google.com,AI
  - DOMAIN-SUFFIX,bard.google.com,AI
  - DOMAIN-SUFFIX,aistudio.google.com,AI
  - DOMAIN-SUFFIX,generativelanguage.googleapis.com,AI
  - DOMAIN-SUFFIX,deepmind.google,AI
  - DOMAIN-SUFFIX,copilot.microsoft.com,AI
  - DOMAIN-SUFFIX,perplexity.ai,AI
  - DOMAIN-SUFFIX,poe.com,AI
  - DOMAIN-SUFFIX,character.ai,AI
  - DOMAIN-SUFFIX,x.ai,AI
  - DOMAIN-SUFFIX,grok.com,AI
  - DOMAIN-SUFFIX,suno.com,AI
  - DOMAIN-SUFFIX,midjourney.com,AI
  - DOMAIN-SUFFIX,stability.ai,AI
  - DOMAIN-SUFFIX,huggingface.co,AI
  - DOMAIN-SUFFIX,replicate.com,AI
  - DOMAIN-SUFFIX,runwayml.com,AI
  - DOMAIN-SUFFIX,elevenlabs.io,AI
  - DOMAIN-KEYWORD,openai,AI

  # --- 自定义补丁: TikTok (香港/大陆 IP 均被屏蔽) ---
  - DOMAIN-SUFFIX,tiktok.com,PROXY
  - DOMAIN-SUFFIX,tiktokcdn.com,PROXY
  - DOMAIN-SUFFIX,tiktokcdn-us.com,PROXY
  - DOMAIN-SUFFIX,tiktokv.com,PROXY
  - DOMAIN-SUFFIX,tiktokd.org,PROXY
  - DOMAIN-SUFFIX,musical.ly,PROXY
  - DOMAIN-SUFFIX,muscdn.com,PROXY
  - DOMAIN-SUFFIX,byteoversea.com,PROXY
  - DOMAIN-SUFFIX,ibytedtos.com,PROXY
  - DOMAIN-SUFFIX,ipstatp.com,PROXY
  - DOMAIN-KEYWORD,tiktok,PROXY

  # --- 国内直连 ---
  - RULE-SET,direct,DIRECT
  - RULE-SET,cncidr,DIRECT,no-resolve

  # --- GeoIP 兜底 ---
  - GEOIP,CN,DIRECT

  # --- 最终规则: 默认直连 (黑名单模式) ---
  - MATCH,DIRECT
