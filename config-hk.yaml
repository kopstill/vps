# ==============================================================
# Mihomo 分流配置 - 香港版
# 适用客户端: Clash Verge (macOS) / Stash (iOS)
# 规则来源: Loyalsoldier/clash-rules (每日自动更新)
# 策略: 黑名单模式 — 仅代理必要服务，其余直连
# ==============================================================

# --- 基础设置 ---
mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

# --- GeoData 设置 (Mihomo) ---
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  mmdb: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb"

# --- TLS 指纹 ---
tls:
  fingerprint: chrome

# --- DNS 配置 ---
# 香港无 DNS 污染，配置较简单
dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.test"
    - "dns.msftncsi.com"
    - "www.msftncsi.com"
    - "*.msftconnecttest.com"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.apple.com"
    - "time-ios.apple.com"
    - "ntp.*.com"
    - "stun.*.*"
    - "stun.*.*.*"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
  default-nameserver:
    - 223.5.5.5
    - 1.1.1.1
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  fallback:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: HK

# ==============================================================
# 代理节点
# ⚠️ 请替换下方占位符为你的实际 Xray REALITY 配置
# ==============================================================
proxies:
  - name: "US-LAX-DMIT"
    type: vless
    server: YOUR_SERVER_IP         # ← 替换: 服务器 IP
    port: 443                      # ← 替换: 端口号
    uuid: YOUR_UUID                # ← 替换: UUID
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: YOUR_SNI_DOMAIN    # ← 替换: SNI 域名 (如 www.microsoft.com)
    reality-opts:
      public-key: YOUR_PUBLIC_KEY  # ← 替换: 公钥
      short-id: YOUR_SHORT_ID     # ← 替换: Short ID
    client-fingerprint: chrome

# ==============================================================
# 代理组
# ==============================================================
proxy-groups:
  # 主代理选择
  - name: Proxy
    type: select
    proxies:
      - US-LAX-DMIT
      - DIRECT

  # AI 服务 — 香港同样无法直接访问 OpenAI/Claude/Gemini，必须走美国
  - name: AI
    type: select
    proxies:
      - US-LAX-DMIT

  # 流媒体 (部分美区内容需要代理)
  - name: Streaming
    type: select
    proxies:
      - US-LAX-DMIT
      - DIRECT

  # Google (香港可直连，但可选代理)
  - name: Google
    type: select
    proxies:
      - DIRECT
      - US-LAX-DMIT

  # Telegram (香港可直连)
  - name: Telegram
    type: select
    proxies:
      - DIRECT
      - US-LAX-DMIT

  # 社交媒体 (香港可直连)
  - name: Social
    type: select
    proxies:
      - DIRECT
      - US-LAX-DMIT

  # GitHub (香港可直连)
  - name: GitHub
    type: select
    proxies:
      - DIRECT
      - US-LAX-DMIT

  # Apple 服务
  - name: Apple
    type: select
    proxies:
      - DIRECT
      - US-LAX-DMIT

  # Microsoft 服务
  - name: Microsoft
    type: select
    proxies:
      - DIRECT
      - US-LAX-DMIT

  # 国内
  - name: Domestic
    type: select
    proxies:
      - DIRECT
      - US-LAX-DMIT

  # 广告拦截
  - name: AdBlock
    type: select
    proxies:
      - REJECT
      - DIRECT

# ==============================================================
# 规则提供者 (Loyalsoldier/clash-rules, 每日 6:30 AM 北京时间更新)
# 香港直连 GitHub，无需 CDN
# ==============================================================
rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

  private:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  icloud:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/icloud.txt"
    path: ./ruleset/icloud.yaml
    interval: 86400

  apple:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/apple.txt"
    path: ./ruleset/apple.yaml
    interval: 86400

  google:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/google.txt"
    path: ./ruleset/google.yaml
    interval: 86400

  proxy:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/proxy.txt"
    path: ./ruleset/proxy.yaml
    interval: 86400

  direct:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400

  gfw:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt"
    path: ./ruleset/gfw.yaml
    interval: 86400

  tld-not-cn:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/tld-not-cn.txt"
    path: ./ruleset/tld-not-cn.yaml
    interval: 86400

  telegramcidr:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 86400

  cncidr:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt"
    path: ./ruleset/cncidr.yaml
    interval: 86400

  lancidr:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 86400

  applications:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/applications.txt"
    path: ./ruleset/applications.yaml
    interval: 86400

# ==============================================================
# 分流规则
# 香港版: 绝大部分直连，仅 AI/美区流媒体等走代理
# ==============================================================
rules:
