# ==============================================================
# Mihomo 分流配置 - 香港版
# 适用客户端: Clash Verge Rev (macOS) / Stash (iOS)
# 规则来源: Loyalsoldier/clash-rules (每日自动更新)
# 策略: 黑名单模式 — 默认直连，仅 AI/手动选择的服务走代理
# ==============================================================

# --- 基础设置 ---
mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
find-process-mode: strict

# --- GeoData 设置 ---
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  mmdb: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb"

# --- DNS 配置 ---
# 香港网络无污染，DNS 配置较简单
dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.test"
    - "+.msftncsi.com"
    - "+.msftconnecttest.com"
    - "+.pool.ntp.org"
    - "time.*.com"
    - "time.*.apple.com"
    - "stun.*.*"
    - "+.stun.*.*"
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  fallback:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: HK

# ==============================================================
# 代理节点 (模板)
# 使用方式:
#   1. cp config-hk.template.yaml config-hk.yaml
#   2. 把下方所有 YOUR_* 占位符替换为真实值
#   3. config-hk.yaml 已在 .gitignore 中，不会被提交
# ==============================================================
proxies:
  - name: "USA"
    type: ss
    server: YOUR_USA_SERVER
    port: YOUR_USA_PORT
    cipher: chacha20-ietf-poly1305
    password: "YOUR_USA_PASSWORD"
    udp: true
    plugin: v2ray-plugin
    plugin-opts:
      mode: websocket
      mux: 0
  - name: "USD"
    type: vless
    server: YOUR_USD_SERVER
    port: 443
    uuid: YOUR_USD_UUID
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: YOUR_USD_SNI
    reality-opts:
      public-key: YOUR_USD_PUBLIC_KEY
      short-id: YOUR_USD_SHORT_ID
    client-fingerprint: chrome
  - name: "KOR"
    type: ss
    server: YOUR_KOR_SERVER
    port: YOUR_KOR_PORT
    cipher: chacha20-ietf-poly1305
    password: "YOUR_KOR_PASSWORD"
    udp: true

# ==============================================================
# 策略组
# ==============================================================
proxy-groups:
  # 主代理出口 (手动切换)
  - name: PROXY
    type: select
    proxies:
      - USD
      - USA
      - KOR
      - AUTO
  # 自动选择最快节点 (含全部出口)
  - name: AUTO
    type: url-test
    proxies:
      - USD
      - USA
      - KOR
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  # 仅美国节点的自动选择 (供 AI 使用，避免落到 KOR 被拒)
  - name: AUTO-US
    type: url-test
    proxies:
      - USD
      - USA
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  # AI 服务 (HK IP 被 OpenAI/Claude/Gemini 等屏蔽，强制美国出口)
  - name: AI
    type: select
    proxies:
      - AUTO-US
      - USD
      - USA

# ==============================================================
# 规则提供者 (Loyalsoldier/clash-rules, 每日 6:30 AM 北京时间更新)
# ==============================================================
rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

  private:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  direct:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400

  cncidr:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt"
    path: ./ruleset/cncidr.yaml
    interval: 86400

  lancidr:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 86400

  applications:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/applications.txt"
    path: ./ruleset/applications.yaml
    interval: 86400

  icloud:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/icloud.txt"
    path: ./ruleset/icloud.yaml
    interval: 86400

  apple:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/apple.txt"
    path: ./ruleset/apple.yaml
    interval: 86400

  telegramcidr:
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 86400

# ==============================================================
# 分流规则
# 香港默认直连，仅 AI 走代理；其他服务需要代理时通过 PROXY 组手动切换
# ==============================================================
rules:
  # --- 局域网/私有网络 ---
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve
  - RULE-SET,applications,DIRECT

  # --- 广告拦截 ---
  - RULE-SET,reject,REJECT

  # --- AI 服务 (HK IP 被 OpenAI/Claude/Gemini 等屏蔽，必须走美国) ---
  # geosite category-ai-!cn 已覆盖: OpenAI/Claude/Gemini/Copilot/Perplexity/
  # Grok/Huggingface/ElevenLabs/Poe/Cursor/Codeium/Cohere/Mistral/Groq 等
  - GEOSITE,category-ai-!cn,AI
  # 兜底: geosite 未收录的图像/音频/角色生成 AI
  - DOMAIN-SUFFIX,midjourney.com,AI
  - DOMAIN-SUFFIX,suno.com,AI
  - DOMAIN-SUFFIX,stability.ai,AI
  - DOMAIN-SUFFIX,replicate.com,AI
  - DOMAIN-SUFFIX,runwayml.com,AI
  - DOMAIN-SUFFIX,character.ai,AI

  # --- TikTok (香港/大陆 IP 均被屏蔽) ---
  - GEOSITE,tiktok,PROXY

  # --- Apple/iCloud 直连 (HK 默认就是直连，显式声明以便统一管理) ---
  - RULE-SET,icloud,DIRECT
  - RULE-SET,apple,DIRECT

  # --- Telegram 直连 (HK 可直连 Telegram，无需走代理) ---
  - RULE-SET,telegramcidr,DIRECT,no-resolve

  # --- 国内直连 ---
  - RULE-SET,direct,DIRECT
  - RULE-SET,cncidr,DIRECT,no-resolve

  # --- GeoIP 兜底 ---
  - GEOIP,CN,DIRECT

  # --- 最终规则: 默认直连 (黑名单模式) ---
  - MATCH,DIRECT
