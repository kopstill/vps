# ==============================================================
# Mihomo 分流配置 - 香港版
# 适用客户端: Clash Verge Rev (macOS) / Stash (iOS)
# 规则来源: Loyalsoldier/clash-rules (每日自动更新)
# 策略: 黑名单模式 — 默认直连，仅 AI/手动选择的服务走代理
# ==============================================================

# --- 基础设置 ---
mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
find-process-mode: strict

# --- GeoData 设置 ---
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"

# --- DNS 配置 ---
# 香港网络无污染，DNS 配置较简单
dns:
  enable: true
  listen: 127.0.0.1:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.test"
    - "+.msftncsi.com"
    - "+.msftconnecttest.com"
    - "+.pool.ntp.org"
    - "time.*.com"
    - "time.*.apple.com"
    - "stun.*.*"
    - "+.stun.*.*"
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  fallback:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: HK

# --- Sniffer 流量嗅探 ---
# 在 fake-ip 模式下从 TLS SNI / HTTP Host / QUIC 中提取真实域名,
# 让 DOMAIN-SUFFIX / GEOSITE 规则能准确命中 HTTPS 流量
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# ==============================================================
# 代理节点 (模板)
# 使用方式:
#   1. cp clash-hk.template.yaml clash-hk.yaml
#   2. 把下方所有 YOUR_* 占位符替换为真实值
#   3. clash-hk.yaml 已在 .gitignore 中，不会被提交
# ==============================================================
proxies:
  - name: "EXAMPLE"
    type: vless
    server: YOUR_SERVER
    port: 443
    uuid: YOUR_UUID
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: YOUR_SNI
    reality-opts:
      public-key: YOUR_PUBLIC_KEY
      short-id: YOUR_SHORT_ID
    client-fingerprint: chrome

# ==============================================================
# 策略组
# 按需添加更多节点到 proxies 列表和策略组中
# ==============================================================
proxy-groups:
  # 主代理出口 (手动切换)
  - name: PROXY
    type: select
    proxies:
      - EXAMPLE

  # AI 服务 (HK IP 被 OpenAI/Claude/Gemini 等屏蔽，强制美国出口)
  - name: AI
    type: select
    proxies:
      - EXAMPLE

# ==============================================================
# 规则提供者 (Loyalsoldier/clash-rules, 每日 6:30 AM 北京时间更新)
# ==============================================================
rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400

  private:
    type: http
    behavior: domain
    url: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  direct:
    type: http
    behavior: domain
    url: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400

  cncidr:
    type: http
    behavior: ipcidr
    url: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
    path: ./ruleset/cncidr.yaml
    interval: 86400

  lancidr:
    type: http
    behavior: ipcidr
    url: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 86400

  applications:
    type: http
    behavior: classical
    url: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt"
    path: ./ruleset/applications.yaml
    interval: 86400

  icloud:
    type: http
    behavior: domain
    url: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt"
    path: ./ruleset/icloud.yaml
    interval: 86400

  apple:
    type: http
    behavior: domain
    url: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt"
    path: ./ruleset/apple.yaml
    interval: 86400

  telegramcidr:
    type: http
    behavior: ipcidr
    url: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 86400

# ==============================================================
# 分流规则
# 香港默认直连，仅 AI/TikTok 走代理
# 注: PROXY 组实际上只被 TikTok 规则使用,在 GUI 中切换 PROXY 组的节点
#     只会影响 TikTok 的出口；AI 走独立的 AI 组 (AUTO-US)
# ==============================================================
rules:
  # --- 局域网/私有网络 ---
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve
  - RULE-SET,applications,DIRECT

  # --- 广告拦截 ---
  - RULE-SET,reject,REJECT

  # --- AI 服务 (HK IP 被 OpenAI/Claude/Gemini 等屏蔽，必须走美国) ---
  # geosite category-ai-!cn 已覆盖: OpenAI/Claude/Gemini/Copilot/Perplexity/
  # Grok/Huggingface/ElevenLabs/Poe/Cursor/Codeium/Cohere/Mistral/Groq 等
  - GEOSITE,category-ai-!cn,AI
  # 兜底: geosite 未收录的图像/音频/角色生成 AI
  - DOMAIN-SUFFIX,midjourney.com,AI
  - DOMAIN-SUFFIX,suno.com,AI
  - DOMAIN-SUFFIX,stability.ai,AI
  - DOMAIN-SUFFIX,replicate.com,AI
  - DOMAIN-SUFFIX,runwayml.com,AI
  - DOMAIN-SUFFIX,character.ai,AI

  # --- TikTok (香港/大陆 IP 均被屏蔽) ---
  - GEOSITE,tiktok,PROXY

  # --- Apple/iCloud 直连 (HK 默认就是直连，显式声明以便统一管理) ---
  - RULE-SET,icloud,DIRECT
  - RULE-SET,apple,DIRECT

  # --- Telegram 直连 (HK 可直连 Telegram，无需走代理) ---
  - RULE-SET,telegramcidr,DIRECT,no-resolve

  # --- 国内直连 ---
  - RULE-SET,direct,DIRECT
  - RULE-SET,cncidr,DIRECT,no-resolve

  # --- GeoIP 兜底 ---
  - GEOIP,CN,DIRECT

  # --- 最终规则: 默认直连 (黑名单模式) ---
  - MATCH,DIRECT
